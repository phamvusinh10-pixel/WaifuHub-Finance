        // Hàm hiển thị thông báo Toast chuyên nghiệp
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            // Tự động xóa khỏi DOM sau khi animation kết thúc (3 giây)
            setTimeout(() => { toast.remove(); }, 3000);
        }

        // Hiện nút Back to top khi cuộn
        window.onscroll = function() {
            const btn = document.getElementById('backToTop');
            if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) btn.style.display = "block";
            else btn.style.display = "none";
        };

        // Cập nhật 3 ảnh có lượt like cao nhất
        function updateTopLikedImages() {
            const container = document.getElementById('topLikedContainer');
            if (!container) return;

            const top3 = [...currentImagesArray]
                .sort((a, b) => (b.likes || 0) - (a.likes || 0))
                .slice(0, 3);

            if (top3.length === 0) {
                container.innerHTML = '<div style="color: rgba(0,255,255,0.3); font-size: 10px;">AWAITING DATA...</div>';
                return;
            }

            container.innerHTML = top3.map((item, index) => `
                <div class="top-card" onclick="findAndOpenImage('${item.id}')">
                    <img src="${item.url.replace('/upload/', '/upload/f_auto,q_auto,w_500,h_750,c_fill/')}" alt="${escapeHTML(item.title)}">
                    <div class="top-badge"><i class="fas fa-heart"></i> ${item.likes || 0}</div>
                </div>
            `).join('');
        }

        function findAndOpenImage(id) {
            const index = currentImagesArray.findIndex(img => img.id === id);
            if (index !== -1) {
                // Đóng tìm kiếm để index không bị lệch nếu đang lọc
                if (document.getElementById('searchInput').value !== '') {
                    document.getElementById('searchInput').value = '';
                    clearSearch();
                }
                switchView('images');
                openLightbox(index);
            }
        }

        // Cập nhật số liệu thống kê trên bảng điều khiển
        function updateDashboardStats() {
            const total = currentImagesArray.length;
            
            // Tính số lượng ảnh trong ngày hôm nay
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const todayCount = currentImagesArray.filter(img => (img.timestamp || 0) >= todayStart).length;

            const totalEl = document.getElementById('totalImagesStat');
            const todayEl = document.getElementById('todayImagesStat');

            if (totalEl) totalEl.innerText = total.toLocaleString();
            if (todayEl) todayEl.innerText = `+${todayCount}`;
        }

        // Hàm sao lưu dữ liệu thủ công: Xuất toàn bộ Firebase ra file JSON
        async function backupDatabase() {
            const password = prompt("Nhập mật khẩu để sao lưu dữ liệu:");
            if (password !== "110620") {
                if (password !== null) showToast("Mật khẩu không chính xác!", "error");
                return;
            }
            if (!confirm("Bạn muốn tải bản sao lưu toàn bộ dữ liệu ảnh hiện tại về máy?")) return;
            
            try {
                const snapshot = await database.ref('cosplay_images').once('value');
                const data = snapshot.val();
                
                if (!data) {
                    showToast("Không có dữ liệu để sao lưu!", "error");
                    return;
                }

                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                const date = new Date().toISOString().split('T')[0];
                link.href = url;
                link.download = `waifu_hub_backup_${date}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast("Đã tải bản sao lưu thành công!");
            } catch (e) {
                showToast("Lỗi sao lưu: " + e.message, "error");
            }
        }

        // Hàm khôi phục dữ liệu: Đọc file JSON và nạp vào Firebase
        async function handleRestore(event) {
            const password = prompt("Nhập mật khẩu để khôi phục dữ liệu:");
            if (password !== "110620") {
                if (password !== null) showToast("Mật khẩu không chính xác!", "error");
                event.target.value = '';
                return;
            }

            const file = event.target.files[0];
            if (!file) return;

            if (!confirm("CẢNH BÁO: Hành động này sẽ GHI ĐÈ toàn bộ danh sách ảnh hiện tại bằng dữ liệu từ file JSON. Bạn có chắc chắn muốn tiếp tục?")) {
                event.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Kiểm tra sơ bộ xem có phải dữ liệu Waifu Hub không (check field url)
                    const keys = Object.keys(data);
                    if (keys.length > 0 && (data[keys[0]].url || data[keys[0]].displayId)) {
                        statusDiv.innerText = "🔄 Đang ghi đè dữ liệu lên Firebase...";
                        
                        // Sử dụng set() để ghi đè toàn bộ node cosplay_images
                        await database.ref('cosplay_images').set(data);
                        
                        showToast("Khôi phục dữ liệu hoàn tất!");
                    } else {
                        throw new Error("File JSON không chứa dữ liệu ảnh hợp lệ!");
                    }
                } catch (err) {
                    console.error(err);
                    showToast("Lỗi khôi phục: " + err.message, "error");
                } finally {
                    statusDiv.innerText = "";
                    event.target.value = ''; // Reset input để có thể chọn lại cùng 1 file
                }
            };
            reader.readAsText(file);
        }

        // --- HÀM XỬ LÝ THÙNG RÁC (RECYCLE BIN) ---
        async function openRecycleBin(skipPassword = false) {
            if (!skipPassword) {
                const password = prompt("Nhập mật khẩu để xem Thùng rác:");
                if (password !== "110620") {
                    if (password !== null) showToast("Mật khẩu không chính xác!", "error");
                    return;
                }
            }

            const modal = document.getElementById('recycleBinModal');
            const container = document.getElementById('recycleBinContent');
            const emptyMsg = document.getElementById('recycleBinEmptyMsg');
            const btnRestoreAll = document.getElementById('btnRestoreAll');
            const btnSelectAllDeleted = document.getElementById('btnSelectAllDeleted');
            
            container.innerHTML = '';
            emptyMsg.style.display = 'none';
            modal.style.display = 'flex';
            if(btnRestoreAll) btnRestoreAll.style.display = 'none';
            if(btnSelectAllDeleted) btnSelectAllDeleted.style.display = 'none';
            if (!skipPassword) { selectedDeletedIds.clear(); updateRecycleBinControls(); }

            try {
                const snapshot = await database.ref('deleted_images').once('value');
                const data = snapshot.val();
                
                if (!data) {
                    emptyMsg.style.display = 'block';
                    return;
                }

                if(btnRestoreAll) btnRestoreAll.style.display = 'block';
                if(btnSelectAllDeleted) btnSelectAllDeleted.style.display = 'block';

                container.innerHTML = Object.keys(data).map(key => {
                    const item = data[key];
                    const isSelected = selectedDeletedIds.has(key);
                    return `
                        <div class="gallery-card ${isSelected ? 'selected' : ''}" data-key="${key}" style="opacity:1; cursor: default; margin-bottom: 0;" onclick="toggleDeletedSelection('${key}')">
                            <input type="checkbox" class="card-selector" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleDeletedSelection('${key}')">
                            <img src="${item.url.replace('/upload/', '/upload/f_auto,q_auto,w_300,h_200,c_fill/')}" style="height: 120px; object-fit: cover;" loading="lazy">
                            <div style="padding: 10px; background: rgba(0,0,0,0.5);" onclick="event.stopPropagation()">
                                <div style="font-size: 10px; color: #00ffff; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                    ${escapeHTML(item.title)}
                                </div>
                                <div style="display: flex; gap: 5px;">
                                    <button onclick="window.open('${item.url}', '_blank')" class="btn-upload" style="flex: 1; padding: 6px; font-size: 10px; background: #ff007f; color: #fff; box-shadow: none; border-radius: 8px;">XEM ẢNH</button>
                                    <button onclick="restoreImage('${key}')" class="btn-upload" style="flex: 1; padding: 6px; font-size: 10px; background: #00ffff; color: #000; box-shadow: none; border-radius: 8px;">KHÔI PHỤC</button>
                                </div>
                                <button onclick="permanentDelete('${key}')" style="background: transparent; color: #ff007f; border: 1px solid #ff007f; padding: 4px; border-radius: 8px; font-size: 9px; cursor: pointer; margin-top: 8px; width: 100%; font-weight: bold;">XÓA VĨNH VIỄN</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                showToast("Lỗi tải thùng rác: " + e.message, "error");
            }
        }

        function toggleDeletedSelection(key) {
            const card = document.querySelector(`#recycleBinContent .gallery-card[data-key="${key}"]`);
            const checkbox = card ? card.querySelector('.card-selector') : null;

            if (selectedDeletedIds.has(key)) {
                selectedDeletedIds.delete(key);
                if (card) card.classList.remove('selected');
                if (checkbox) checkbox.checked = false;
            } else {
                selectedDeletedIds.add(key);
                if (card) card.classList.add('selected');
                if (checkbox) checkbox.checked = true;
            }
            updateRecycleBinControls();
            // Bỏ gọi openRecycleBin(true) để tránh bị nháy
        }

        async function toggleAllDeletedSelection() {
            const snapshot = await database.ref('deleted_images').once('value');
            const data = snapshot.val();
            if (!data) return;
            const keys = Object.keys(data);
            
            const isSelectingAll = !keys.every(k => selectedDeletedIds.has(k));
            
            if (isSelectingAll) keys.forEach(k => selectedDeletedIds.add(k));
            else selectedDeletedIds.clear();

            // Cập nhật giao diện tất cả các card hiện có mà không nạp lại trang
            document.querySelectorAll('#recycleBinContent .gallery-card').forEach(card => {
                const checkbox = card.querySelector('.card-selector');
                if (isSelectingAll) {
                    card.classList.add('selected');
                    if (checkbox) checkbox.checked = true;
                } else {
                    card.classList.remove('selected');
                    if (checkbox) checkbox.checked = false;
                }
            });
            updateRecycleBinControls();
        }

        function updateRecycleBinControls() {
            const count = selectedDeletedIds.size;
            const btnRes = document.getElementById('btnRestoreSelected');
            const btnDel = document.getElementById('btnDeleteSelected');
            if (count > 0) {
                if(btnRes) btnRes.style.display = 'block';
                if(btnDel) btnDel.style.display = 'block';
            } else {
                if(btnRes) btnRes.style.display = 'none';
                if(btnDel) btnDel.style.display = 'none';
            }
        }

        async function restoreImage(key) {
            const password = prompt("Nhập mật khẩu để khôi phục ảnh:");
            if (password !== "110620") {
                if (password !== null) showToast("Mật khẩu không chính xác!", "error");
                return;
            }

            try {
                const snapshot = await database.ref(`deleted_images/${key}`).once('value');
                const data = snapshot.val();
                if (data) {
                    delete data.deletedAt; 
                    await database.ref(`cosplay_images/${key}`).set(data);
                    await database.ref(`deleted_images/${key}`).remove();
                    selectedDeletedIds.delete(key);
                    updateRecycleBinControls();
                    showToast("Khôi phục thành công!");
                    openRecycleBin(true); // Tự động làm mới danh sách mà không hỏi lại mật khẩu
                }
            } catch (e) {
                showToast("Lỗi khôi phục: " + e.message, "error");
            }
        }

        async function restoreSelectedImages() {
            if (selectedDeletedIds.size === 0) return;
            const password = prompt(`Nhập mật khẩu để khôi phục ${selectedDeletedIds.size} ảnh đã chọn:`);
            if (password !== "110620") {
                if (password !== null) showToast("Mật khẩu không chính xác!", "error");
                return;
            }
            try {
                const snapshot = await database.ref('deleted_images').once('value');
                const data = snapshot.val();
                if (!data) return;
                const updates = {};
                selectedDeletedIds.forEach(key => {
                    const item = data[key];
                    if (item) {
                        delete item.deletedAt;
                        updates[`/cosplay_images/${key}`] = item;
                        updates[`/deleted_images/${key}`] = null;
                    }
                });
                statusDiv.innerText = "🔄 Đang khôi phục các ảnh đã chọn...";
                await database.ref().update(updates);
                showToast(`Đã khôi phục thành công ${selectedDeletedIds.size} ảnh!`);
                selectedDeletedIds.clear();
                updateRecycleBinControls();
                openRecycleBin(true);
            } catch (e) { showToast("Lỗi: " + e.message, "error"); }
            finally { statusDiv.innerText = ""; }
        }

        async function restoreAllImages() {
            const password = prompt("Nhập mật khẩu để khôi phục tất cả ảnh:");
            if (password !== "110620") {
                if (password !== null) showToast("Mật khẩu không chính xác!", "error");
                return;
            }

            try {
                const snapshot = await database.ref('deleted_images').once('value');
                const data = snapshot.val();
                if (!data) return;

                const updates = {};
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    delete item.deletedAt;
                    updates[`/cosplay_images/${key}`] = item;
                    updates[`/deleted_images/${key}`] = null; // Xóa khỏi thùng rác
                });

                statusDiv.innerText = "🔄 Đang khôi phục toàn bộ Thùng rác...";
                await database.ref().update(updates);
                selectedDeletedIds.clear();
                updateRecycleBinControls();
                showToast(`Đã khôi phục thành công ${Object.keys(data).length} ảnh!`);
                openRecycleBin(true); // Làm mới UI
            } catch (e) { showToast("Lỗi: " + e.message, "error"); }
            finally { statusDiv.innerText = ""; }
        }

        async function permanentDelete(key) {
            if (!confirm("Xóa vĩnh viễn ảnh này? Thao tác này không thể hoàn tác.")) return;
            try {
                await database.ref(`deleted_images/${key}`).remove();
                selectedDeletedIds.delete(key);
                updateRecycleBinControls();
                showToast("Đã xóa vĩnh viễn.");
                openRecycleBin(true);
            } catch (e) { showToast("Lỗi: " + e.message, "error"); }
        }

        async function bulkPermanentDelete() {
            if (selectedDeletedIds.size === 0) return;
            if (!confirm(`Xóa vĩnh viễn ${selectedDeletedIds.size} ảnh đã chọn? Thao tác này không thể hoàn tác.`)) return;
            try {
                const updates = {};
                selectedDeletedIds.forEach(key => {
                    updates[`/deleted_images/${key}`] = null;
                });
                await database.ref().update(updates);
                showToast("Đã xóa vĩnh viễn các ảnh đã chọn.");
                selectedDeletedIds.clear();
                updateRecycleBinControls();
                openRecycleBin(true);
            } catch (e) { showToast("Lỗi: " + e.message, "error"); }
        }

        // Khi trang web tải xong, kiểm tra xem có hình nền đã lưu không
        window.addEventListener('DOMContentLoaded', () => {
            const savedBG = localStorage.getItem('cyberpunk_bg');
            if (savedBG) applyBackground(savedBG);
        });

        // ================= XỬ LÝ NÚT BACK TRÊN ĐIỆN THOẠI =================
        window.addEventListener('popstate', function(event) {
            const lightbox = document.getElementById('lightboxOverlay');
            
            // 1. Nếu Lightbox đang mở, ưu tiên đóng Lightbox trước
            if (lightbox.style.display === 'flex') {
                lightbox.style.display = 'none';
            } 
            // 2. Nếu đang xem chi tiết Album (có từ khóa tìm kiếm), quay về danh sách Album
            else if (currentViewMode === 'images' && document.getElementById('searchInput').value !== '') {
                switchView('albums');
            }
        });

        document.getElementById('lightboxOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // ================= XỬ LÝ CLICK PHẢI NÚT LIKE ĐỂ HIỆN MENU VÒNG TRÒN =================
        document.addEventListener('DOMContentLoaded', () => {
            const likeBtn = document.getElementById('lightboxLikeBtn');
            const floatingActions = document.getElementById('floatingActions');

            if (likeBtn && floatingActions) {
                // Xử lý right-click (contextmenu) để hiện giao diện tuyến
                likeBtn.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    floatingActions.classList.toggle('show');
                    if (navigator.vibrate) navigator.vibrate(50); // Rung nhẹ phản hồi
                });

                // Đóng menu khi nhấn ra ngoài vùng menu và nút Like
                document.addEventListener('mousedown', (e) => {
                    if (!likeBtn.contains(e.target) && !floatingActions.contains(e.target)) {
                        floatingActions.classList.remove('show');
                    }
                });
                
                // Đóng menu khi nhấn vào các nút hành động
                floatingActions.querySelectorAll('.btn-action-mini').forEach(btn => {
                    btn.addEventListener('click', () => {
                        setTimeout(() => floatingActions.classList.remove('show'), 300);
                    });
                });
            }
        });
      </script>
