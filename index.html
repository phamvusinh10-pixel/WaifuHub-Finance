<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Kho Lưu Trữ Ảnh Đẹp</title>
    <meta name="description" content="Nơi chia sẻ và lưu trữ các album ảnh chất lượng cao, giao diện mượt mà và dễ dàng sử dụng.">
    <link rel="icon" type="image/png" href="assets/my-avatar.png">
    <meta name="google-site-verification" content="FdwUGjw8o9vsOUvjHIFAfKP_gD5uiTOjIxPsaljNojc" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0e15; /* Nền tối chuyên dụng cho UI hiện đại */
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- PHÂN VÙNG GIAO DIỆN --- */
        .landing-zone {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Tập trung nội dung vào giữa màn hình */
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .content-zone {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 100px;
            min-height: 100vh;
            z-index: 1;
        }
        /* -------------------------- */

        /* Lớp nền ảnh tùy chỉnh */
        #customBackground {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3; /* Nằm dưới cả Matrix */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: none;
        }

        /* Canvas hiệu ứng Ma trận chạy ngầm */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* Nằm dưới cùng */
        }

        /* Hiệu ứng Cực quang (Aurora) */
        .aurora-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -0.5; /* Nằm ngay trên các lớp nền khác để hiện rõ hơn */
            overflow: hidden;
            pointer-events: none;
        }
        .aurora-streak {
            position: absolute;
            top: 0;
            left: -20%;
            width: 140%;
            height: 120%;
            background: linear-gradient(
                110deg,
                transparent 20%,
                rgba(0, 255, 255, 0.4) 35%,
                rgba(255, 0, 127, 0.5) 50%,
                rgba(183, 0, 255, 0.4) 65%,
                transparent 80%
            );
            filter: blur(40px);
            mix-blend-mode: screen;
            transform-origin: top center;
            animation: silk-flow 6s ease-in-out infinite alternate;
        }
        .aurora-streak:nth-child(2) {
            left: -10%;
            background: linear-gradient(
                130deg,
                transparent 10%,
                rgba(0, 255, 127, 0.3) 30%,
                rgba(0, 128, 255, 0.4) 60%,
                transparent 90%
            );
            filter: blur(50px);
            animation-duration: 9s;
            animation-delay: -4s;
        }
        .aurora-streak:nth-child(3) {
            left: 0%;
            background: linear-gradient(
                70deg,
                transparent 30%,
                rgba(255, 0, 255, 0.1) 50%,
                transparent 70%
            );
            filter: blur(30px);
            animation-duration: 7.5s;
            animation-delay: -7s;
        }

        /* Lớp phủ tinh vân không gian huyền ảo */
        .cyber-bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 0, 127, 0.15) 0%, rgba(0,0,0,0) 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 204, 0.15) 0%, rgba(0,0,0,0) 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- HEADER: Logo Trái - Tìm kiếm Giữa - Social Phải --- */
        .main-header {
            position: sticky;
            top: 10px;
            width: 98%;
            max-width: 1300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto 30px auto;
            z-index: 1000; /* Đảm bảo luôn nằm trên cùng */
            gap: 20px;
            background: rgba(10, 7, 25, 0.5); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 6px 20px;
            border-radius: 20px;
            /* Viền đổi màu mềm mại hơn */
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: border-glow 6s linear infinite;
        }

        .logo-text {
            /* Dải màu gradient chạy dài để chuyển động mượt */
            background: linear-gradient(90deg, #00ffff, #ff007f, #b700ff, #00ffff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
            margin: 0;
            font-size: 1.2rem;
            /* Kết hợp pulse và flow gradient */
            animation: pulse 2.5s infinite alternate ease-in-out, flow-gradient 10s linear infinite;
            white-space: nowrap;
        }

        .logo-text:hover {
            animation: pulse 1s infinite alternate, glitch 0.15s infinite;
            cursor: default;
        }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 #ff007f, 2px 0 #00ffff; }
            20% { transform: translate(-2px, 1px); text-shadow: 2px -1px #ff007f, -2px 1px #00ffff; }
            40% { transform: translate(-2px, -1px); text-shadow: -2px 1px #ff007f, 2px -1px #00ffff; }
            60% { transform: translate(2px, 1px); text-shadow: 2px 1px #ff007f, -2px -1px #00ffff; }
            80% { transform: translate(2px, -1px); text-shadow: -2px -1px #ff007f, 2px 1px #00ffff; }
            100% { transform: translate(0); }
        }

        @keyframes flow-gradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        @keyframes border-glow {
            0%, 100% { border-color: rgba(0, 255, 255, 0.2); box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }
            50% { border-color: rgba(255, 0, 127, 0.2); box-shadow: 0 0 15px rgba(255, 0, 127, 0.1); }
        }

        @keyframes silk-flow {
            0% {
                transform: rotate(-2deg) skewX(-10deg) translateX(-20px);
                opacity: 0.7;
            }
            50% {
                transform: rotate(2deg) skewX(10deg) translateX(20px);
                opacity: 0.9;
            }
            100% {
                transform: rotate(-1deg) skewX(-5deg) translateX(-10px);
                opacity: 0.7;
            }
        }

        @keyframes pulse {
            0% { transform: scale(0.98); filter: drop-shadow(0 0 5px #ff007f) hue-rotate(-15deg); }
            100% { transform: scale(1.02); filter: drop-shadow(0 0 15px #00ffff) hue-rotate(15deg); }
        }

        /* Hiệu ứng quét Laser */
        @keyframes laser-scan {
            0% { top: -5%; opacity: 0; }
            10% { opacity: 1; }
            50% { filter: hue-rotate(90deg); }
            90% { opacity: 1; }
            100% { top: 105%; opacity: 0; }
        }

        /* Hiệu ứng nhiễu sóng (Glitch) nhẹ */
        @keyframes top-card-glitch {
            0%, 100% { transform: translate(0, 0); filter: brightness(1); }
            33% { transform: translate(-2px, 1px); filter: hue-rotate(10deg) brightness(1.1); }
            66% { transform: translate(2px, -1px); filter: hue-rotate(-10deg) contrast(1.1); }
        }

        /* --- HERO SECTION: Layout chia 2 cụm gọn gàng --- */
        .hero-section {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            margin-bottom: 50px;
            z-index: 1;
            align-items: stretch;
        }

        .upload-box {
            background: rgba(15, 11, 35, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.15);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            flex: 0 0 380px;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* --- MINI STATS GRID --- */
        .stats-mini-grid {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(0, 255, 255, 0.2);
            gap: 10px;
        }
        .stat-mini-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-mini-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .stat-mini-value {
            font-size: 15px;
            font-weight: 800;
            color: #00ffff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }
        .neon-pink-text { color: #ff007f !important; text-shadow: 0 0 8px rgba(255, 0, 127, 0.5) !important; }

        .hero-banner {
            flex: 1;
            border-radius: 30px;
            background: rgba(15, 11, 35, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 127, 0.2);
            position: relative;
            overflow: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .top-liked-header {
            font-size: 12px;
            font-weight: 800;
            color: #ffd700;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 3px;
        }

        .top-liked-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            height: 100%;
        }

        .top-card {
            width: 220px; /* Phóng to hơn nữa */
            height: 330px; /* Phóng to hơn nữa */
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(0, 255, 255, 0.4);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* Thanh quét Laser */
        .top-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #00ffff;
            box-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0, 255, 255, 0.8);
            z-index: 5;
            animation: laser-scan 3s infinite ease-in-out;
            pointer-events: none;
        }

        .top-card:hover {
            transform: scale(1.1) translateY(-10px);
            border-color: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }
        .top-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            animation: top-card-glitch 3s infinite linear;
            will-change: transform, filter;
        }
        .top-card:hover img { transform: scale(1.1); }

        .top-card .top-badge {
            position: absolute;
            bottom: 3px; right: 3px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 1px 5px;
            border-radius: 6px;
            font-size: 8px;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- SEARCH BOX MIDDLE --- */
        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0;
        }

        .social-channels {
            margin-bottom: 0; /* Đưa lên header nên không cần margin */
            gap: 12px;
        }
        .social-channels a { width: 38px; height: 38px; font-size: 16px; border-width: 1px; }
        /* ----------------------------------------------- */

        .upload-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* Ô nhập liệu Cyberpunk */
        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            padding: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }
        .input-field:focus { border-color: #ff007f; box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 50px;
            padding: 6px 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            transition: 0.3s;
        }
        .search-box:focus-within { border-color: #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 15px; margin-left: 10px; }
        .search-box i { color: #00ffff; }

        /* Các kênh mạng xã hội */
        .social-channels {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            z-index: 1;
        }
        .social-channels a {
            color: #00ffff;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 11, 35, 0.8);
            border: 1px solid #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }
        .social-channels a:hover {
            color: #ffffff;
            background: #ff007f;
            border-color: #ff007f;
            box-shadow: 0 0 20px #ff007f;
            transform: translateY(-5px) scale(1.1);
        }
        
        /* Hiệu ứng nhấp nháy cho mũi tên tải xuống */
        .download-blink {
            animation: download-arrow-pulse 1.5s infinite ease-in-out;
        }
        @keyframes download-arrow-pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
                text-shadow: 0 0 8px #ff007f;
            }
            50% {
                opacity: 0.3;
                transform: scale(1.3);
                text-shadow: 0 0 2px #ff007f;
            }
        }
        
        /* Nút X xóa nhanh tìm kiếm */
        #clearSearchBtn {
            display: none;
            cursor: pointer;
            color: rgba(255, 0, 127, 0.7);
            margin-left: 10px;
            transition: 0.3s;
            font-size: 18px;
        }
        #clearSearchBtn:hover {
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            transform: scale(1.1);
        }

        /* Bộ chọn chế độ xem Ảnh/Album */
        .view-switcher {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            z-index: 1;
        }
        .view-btn {
            background: rgba(15, 11, 35, 0.7);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .view-btn.active {
            background: #ff007f;
            border-color: #ff007f;
            color: white;
            box-shadow: 0 0 15px #ff007f;
        }

        /* Thao tác hàng loạt - Giao diện Cyberpunk mới */
        .selection-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            width: 95%;
            max-width: 850px;
            background: rgba(10, 5, 25, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid #00ffff;
            border-radius: 24px;
            padding: 15px 30px;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 255, 0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            opacity: 0;
            pointer-events: none;
        }

        .selection-controls.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .selection-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .selected-count-badge {
            background: linear-gradient(135deg, #f7ff00, #b8bd00);
            color: #000;
            padding: 6px 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 15px;
            box-shadow: 0 0 15px rgba(247, 255, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selection-btn {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .selection-btn:hover { 
            background: rgba(0, 255, 255, 0.15); 
            border-color: #00ffff; 
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .bulk-actions-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .bulk-rename-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff007f;
            color: white;
            padding: 10px 18px;
            border-radius: 14px;
            font-size: 13px;
            outline: none;
            width: 220px;
        }
        .bulk-rename-input:focus { box-shadow: 0 0 10px #ff007f; }

        .btn-bulk-rename {
            background: #ff007f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }
        .btn-bulk-rename:hover { transform: translateY(-2px); box-shadow: 0 0 20px #ff007f; }

        .gallery-card.selected {
            border-color: #f7ff00 !important;
            box-shadow: 0 0 20px #f7ff00, inset 0 0 10px rgba(247, 255, 0, 0.3) !important;
        }

        /* Thanh tiến trình chuyên nghiệp */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffff, #ff007f);
            box-shadow: 0 0 10px #ff007f;
            transition: width 0.3s ease;
        }

        .upload-box:hover {
            border-color: #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.5), inset 0 0 15px rgba(255, 0, 127, 0.3);
        }

        input[type="file"] { display: none; }

        .btn-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 204, 0.4);
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc;
            padding: 10px 15px;
            border-radius: 14px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 0;
            font-weight: 500;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 14px;
        }

        .btn-select:hover { transform: translateY(-2px); border-color: #ff007f; color: #ff007f; text-shadow: 0 0 5px #ff007f; }

        .btn-upload {
            background: linear-gradient(90deg, #ff007f, #d400ff);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.5);
            transition: all 0.3s;
        }

        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 0, 127, 0.8), 0 0 10px #00ffff; }

        /* Giao diện Xếp ảnh so le kiểu Pinterest */
        .gallery-pinterest {
            columns: 4;
            column-gap: 20px; /* Giãn rộng khoảng cách giữa các khung ảnh */
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            z-index: 1;
        }

        /* Khung chứa từng tấm ảnh viền phát sáng kép */
        .gallery-card {
            background: rgba(20, 15, 45, 0.4);
            border-radius: 16px;
            margin-bottom: 20px;
            break-inside: avoid;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            position: relative;
            transition: all 0.3s ease, opacity 0.5s ease;
            opacity: 0; /* Hiện dần khi load */
            cursor: pointer;
            overflow: hidden; /* Cần thiết để vệt sáng không tràn ra ngoài */
        }

        /* Checkbox chọn ảnh */
        .card-selector {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #f7ff00;
            opacity: 0;
            transform: scale(1.2);
            filter: drop-shadow(0 0 5px #000);
            transition: 0.3s;
        }
        .gallery-card:hover .card-selector, .gallery-card.selected .card-selector { opacity: 1; }
        .view-albums-mode .card-selector { display: none; } /* Không hiện checkbox ở chế độ Album */

        /* Hiệu ứng lấp lánh (Shine) cho TẤT CẢ các ảnh */
        .gallery-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -150%;
            width: 50%;
            height: 200%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.25) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(30deg);
            animation: sparkle-streak 2.5s infinite;
            pointer-events: none;
            z-index: 1;
        }

        /* Đổi màu viền so le xen kẽ cho lung linh */
        .gallery-card:nth-child(even) {
            border-color: #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .gallery-card:hover {
            transform: scale(1.02); /* Phóng to nhẹ khi di chuột */
            border-color: #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.4);
        }

        .gallery-card:nth-child(even):hover {
            border-color: #00ffff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 10px rgba(0, 255, 255, 0.4);
        }

        .gallery-card img {
            width: 100%;
            height: auto;
            display: block;
            transition: filter 0.3s;
        }

        /* Lớp phủ chứa nút chức năng khi di chuột vào ảnh */
        .card-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            box-sizing: border-box;
        }

        /* Lớp thông tin nằm TRÊN ảnh (luôn hiển thị) */
        /* Lớp thông tin nằm TRÊN ảnh (ẩn mặc định, hiện khi lướt qua) */
        .card-info-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 12px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 2;
            pointer-events: none;
            opacity: 0; /* Ẩn bớt thông tin thừa */
            transition: opacity 0.3s ease;
        }

        .gallery-card:hover .card-info-overlay { opacity: 1; } /* Hiện khi hover vào ảnh */

        /* Khung tranh đặc biệt cho ảnh được chọn làm bìa Album */
        .album-cover-special {
            border: 3px solid #ff007f !important;
            box-shadow: 0 0 15px #ff007f, inset 0 0 10px rgba(255, 0, 127, 0.5) !important;
            animation: sparkle-glow 1s infinite alternate !important;
        }

        @keyframes sparkle-glow {
            0% { box-shadow: 0 0 10px #ff007f, inset 0 0 5px rgba(255, 0, 127, 0.5); }
            100% { box-shadow: 0 0 25px #ff007f, inset 0 0 20px rgba(255, 0, 127, 0.8); }
        }

        @keyframes sparkle-streak {
            0% { left: -150%; }
            25% { left: 150%; }
            100% { left: 150%; }
        }

        /* Huy hiệu số lượng ảnh trong Album */
        .album-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: #ff007f;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px; font-weight: bold;
            box-shadow: 0 0 10px #ff007f;
        }

        .gallery-card:hover .card-overlay { opacity: 1; }

        /* Nút xóa góc trên bên phải */
        .btn-delete {
            align-self: flex-end;
            background: rgba(255, 0, 79, 0.8);
            border: 1px solid #ff0055; color: white;
            width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
            box-shadow: 0 0 8px #ff0055;
        }
        .btn-delete:hover { transform: scale(1.15); background: red; box-shadow: 0 0 12px red; }

        /* Khu vực tương tác phía dưới ảnh */
        .card-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 12px;
        }

        .stat-group { display: flex; gap: 12px; }
        .stat-item { display: flex; align-items: center; gap: 5px; cursor: pointer; text-shadow: 0 0 4px #fff; }
        .stat-item i { transition: all 0.2s; }
        .stat-item:hover i { color: #ff007f; transform: scale(1.2); }
        
        /* Giao diện Trình Xem Ảnh Phóng To (Lightbox) */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 2, 10, 0.96);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);

        .lightbox-content {

            flex-direction: column;
            align-items: center;

        .lightbox-img {

        /* Nút điều hướng ảnh trong Lightbox */

            position: fixed;
            top: 50%; transform: translateY(-50%);

            transform: translateY(-50%) scale(1.1);
        }
        .nav-left { left: 30px; }
        .nav-right { right: 30px; }

        .lightbox-toolbar {
                 margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;

            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.2);

        .toolbar-left, .toolbar-middle, .toolbar-right {

        #lightboxTitleInput {

        #lightboxIdDisplay {

        #lightboxLikeBtn {

            border-radius: 14px;

            font-size: 24px;

        #lightboxLikeBtn:hover { transform: scale(1.1); box-shadow: 0 0 15px #ff007f; }
        #lightboxLikeBtn.liked { background: #ff007f; color: white; }

        .floating-actions {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;

            height: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10005;
        }
        .floating-actions.show {
            opacity: 1;
            width: 200px;
            height: 200px;
            pointer-events: auto;
        }

        .btn-action-mini {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            transform: scale(0);
            opacity: 0;

        .btn-action-mini:hover { background: #00ffff; color: #000; box-shadow: 0 0 10px #00ffff; }
        .btn-action-mini.delete:hover { background: #ff007f; border-color: #ff007f; color: white; box-shadow: 0 0 10px #ff007f; }

          /* Hiệu ứng bay ra lần lượt cho các icon theo vòng tròn */
        .floating-actions.show .btn-action-mini { transform: scale(1); opacity: 1; }
        .floating-actions.show .btn-action-mini:nth-child(1) { transform: rotate(0deg) translateX(80px) rotate(0deg) scale(1); transition-delay: 0.05s; }
        .floating-actions.show .btn-action-mini:nth-child(2) { transform: rotate(51.4deg) translateX(80px) rotate(-51.4deg) scale(1); transition-delay: 0.1s; }
        .floating-actions.show .btn-action-mini:nth-child(3) { transform: rotate(102.8deg) translateX(80px) rotate(-102.8deg) scale(1); transition-delay: 0.15s; }
        .floating-actions.show .btn-action-mini:nth-child(4) { transform: rotate(154.2deg) translateX(80px) rotate(-154.2deg) scale(1); transition-delay: 0.2s; }
        .floating-actions.show .btn-action-mini:nth-child(5) { transform: rotate(205.6deg) translateX(80px) rotate(-205.6deg) scale(1); transition-delay: 0.25s; }

        .floating-actions.show .btn-action-mini:nth-child(7) { transform: rotate(308.4deg) translateX(80px) rotate(-308.4deg) scale(1); transition-delay: 0.35s; }

        /* Modal mã QR */

        .close-lightbox {
            position: fixed;

            border: 2px solid #ff007f;
            color: #ff007f;

            border-radius: 50%;

            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);

        #backToTop {

        /* --- GIAO DIỆN THÔNG BÁO TOAST --- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 11, 35, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            display: flex; align-items: center; gap: 10px;
            min-width: 200px;
            pointer-events: auto;
            animation: toast-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       toast-out 0.4s ease 2.6s forwards;
        }
        .toast.error { border-color: #ff007f; color: #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
        
        @keyframes toast-in { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes toast-out { from { transform: translateX(0); opacity: 1; } to { transform: translateX(20px); opacity: 0; } }

        .floating-heart {

    <script>
        // HÀM BẢO MẬT: Chống tấn công XSS bằng cách mã hóa các ký tự đặc biệt
        function escapeHTML(str) {
            if (!str) return "";
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ================= JAVASCRIPT: HIỆU ỨNG MA TRẬN SỐ ĐỘNG =================
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Ký tự ma trận kết hợp số, chữ và chữ Nhật cổ điển
        const matrixChars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZMODULEPROTOCOLCODE☠⚡";
        const charArr = matrixChars.split("");
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) drops[x] = 1;

        let lastTime = 0;
        const fps = 60;
        const nextFrameTime = 1000 / fps;

        function drawMatrix(timestamp) {
            if (timestamp - lastTime >= nextFrameTime) {
                // Dùng destination-out để làm mờ vết cũ mà vẫn giữ canvas trong suốt
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';

                // Tối ưu hóa trực quan: Giảm độ đậm Matrix xuống 15% - 20%
                ctx.fillStyle = "rgba(0, 255, 220, 0.18)";
                ctx.font = fontSize + "px monospace";

                for (let i = 0; i < drops.length; i++) {
                    const text = charArr[Math.floor(Math.random() * charArr.length)];
                    
                    if(Math.random() > 0.98) ctx.fillStyle = "rgba(255, 0, 127, 0.2)";
                    else ctx.fillStyle = "rgba(0, 255, 220, 0.18)";

                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
                lastTime = timestamp;
            }
            requestAnimationFrame(drawMatrix);
        }
        requestAnimationFrame(drawMatrix);

        // ================= CẤU HÌNH FIREBASE VÀ IMGBB CHUẨN CỦA BẠN =================
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "webcosplaycuatoi.firebaseapp.com",
            databaseURL: "https://webcosplaycuatoi-default-rtdb.firebaseio.com", 
            projectId: "webcosplaycuatoi",
            storageBucket: "webcosplaycuatoi.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        const CLOUD_NAME = "dzf0r03o7";
        const UPLOAD_PRESET = "ipzgims4";
        // ============================================================================

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const fileInput = document.getElementById('fileInput');
        const imageTitleInput = document.getElementById('imageTitle');
        const preview = document.getElementById('preview');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const statusDiv = document.getElementById('status');
        const galleryBox = document.getElementById('galleryBox');

        let currentImagesArray = []; 
        let currentLightboxIndex = 0;
        let selectedIds = new Set();
        let selectedDeletedIds = new Set();
        let currentViewMode = 'images'; // 'images' hoặc 'albums'

        // Xem trước ảnh mượt
        fileInput.addEventListener('change', function() {
            const files = this.files;
            if (files && files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(files[0]); // Hiển thị hình đầu tiên làm đại diện
                statusDiv.innerText = `📸 Đã chọn ${files.length} ảnh.`;
            }
        });
        // 2. Hàm xử lý upload ảnh lên Cloudinary sau khi đã xử lý đổi tên file
        async function uploadImageToCloudinary(fileObject, customFileName) {
            if (!fileObject) return null;

            const formData = new FormData();
            
            let fileToUpload = fileObject;
            if (customFileName) {
                const fileExtension = fileObject.name.split('.').pop();
                fileToUpload = new File([fileObject], `${customFileName}.${fileExtension}`, {
                    type: fileObject.type
                });
            }

            formData.append("file", fileToUpload);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                if (data.secure_url) {
                    return data.secure_url; 
                } else {
                    throw new Error(data.error?.message || "Lỗi không xác định từ Cloudinary");
                }
            } catch (error) {
                console.error("Lỗi Cloudinary:", error);
                return null;
            }
        }

        async function uploadImage() {
            const title = imageTitleInput.value.trim() || "Waifu";
            const files = Array.from(fileInput.files);
            if (files.length === 0) { showToast('Vui lòng chọn ảnh!', 'error'); return; }

            progressContainer.style.display = 'block';
            const total = files.length;
            let successCount = 0;

            for (let i = 0; i < total; i++) {
                const file = files[i];
                statusDiv.innerText = `🚀 Đang xử lý ${i + 1}/${total}: ${file.name}...`;
                
                const customName = total > 1 ? `${title}_${i + 1}` : title;
                
                // Tạo ID theo định dạng YYYYMMDD-Random (VD: 20231027-5829)
                const now = new Date();
                const datePart = now.getFullYear().toString() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
                const randomPart = Math.floor(1000 + Math.random() * 9000); // 4 số ngẫu nhiên
                const shortId = `${datePart}-${randomPart}`;

                const imageUrl = await uploadImageToCloudinary(file, customName);

                if (imageUrl) {
                    await database.ref('cosplay_images').push({
                        url: imageUrl, 
                        title: title,
                        displayId: shortId,
                        likes: 0,
                        views: 0,
                        timestamp: Date.now()
                    });
                    successCount++;
                }
                progressBar.style.width = `${((i + 1) / total) * 100}%`;
            }

            statusDiv.innerText = `🎉 Thành công ${successCount}/${total} ảnh!`;
            preview.style.display = 'none';
            fileInput.value = '';
            imageTitleInput.value = '';
            setTimeout(() => { progressContainer.style.display = 'none'; progressBar.style.width = '0%'; }, 2000);
        }

        // Khôi phục bộ lắng nghe Firebase để hiển thị ảnh cũ
        database.ref('cosplay_images').on('value', (snapshot) => {
            const data = snapshot.val();
            currentImagesArray = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    item.id = key;
                    if (!item.title || item.title.trim() === "" || item.title === "Waifu") item.title = "Waifu";
                    currentImagesArray.push(item);
                });
                currentImagesArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                updateTopLikedImages();
                updateDashboardStats();
            }
            
            // Xử lý tìm kiếm từ URL ?id=...
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            
            if (targetId && !window.hasAutoSearched) {
                document.getElementById('searchInput').value = targetId;
                filterImages();
                if (filteredArray.length > 0) {
                    openLightbox(0);
                    showToast("Đã tìm thấy ảnh từ mã QR!");
                }
                window.hasAutoSearched = true; // Chỉ chạy một lần khi load trang
            } else {
                refreshView();
            }
        });

        // Hàm quản lý việc chọn ảnh
        function toggleImageSelection(id, event) {
            if (event) event.stopPropagation();
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateSelectionUI();
        }

        function updateSelectionUI() {
            const count = selectedIds.size;
            const controls = document.getElementById('selectionControls');
            const countSpan = document.getElementById('selectedCount');
            
            if (count > 0) {
                countSpan.innerText = count;
                controls.classList.add('show');
            } else {
                controls.classList.remove('show');
            }
            
            // Render lại để cập nhật class .selected và trạng thái checkbox
            refreshView();
        }

        // Hàm hiển thị danh sách ảnh ra màn hình
        function renderGallery(dataArray) {
            if (dataArray.length === 0) {
                galleryBox.innerHTML = '<p style="color: #666; text-align: center; width:100%; padding: 40px;">Không tìm thấy ảnh nào...</p>';
                return;
            }

            const galleryHtml = dataArray.map((item, index) => {
                // Kiểm tra xem ảnh này có phải là ảnh bìa được đặt cho album của nó không
                const savedCover = localStorage.getItem(`album_cover_${item.title}`);
                const isCover = (savedCover === item.url);
                const isSelected = selectedIds.has(item.id);

                return `
                    <div class="gallery-card ${isCover ? 'album-cover-special' : ''} ${isSelected ? 'selected' : ''}"
                         data-id="${item.id}"
                         style="opacity:1" 
                         onclick="openLightbox(${index}, 'filtered');">
                        <input type="checkbox" class="card-selector" 
                               ${isSelected ? 'checked' : ''} 
                               onclick="toggleImageSelection('${item.id}', event)">
                        <img src="${item.url}" alt="${item.title || 'Cosplay'}" loading="lazy" onerror="this.closest('.gallery-card').remove();">
                        <div class="card-overlay">
                            <button class="btn-delete" title="Xóa ảnh" onclick="deleteImage('${item.id}'); event.stopPropagation();" style="pointer-events: auto;">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        <div class="card-info-overlay">
                            <div style="color: #00ffff; font-size: 11px; font-weight: bold; text-shadow: 0 0 8px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                [${escapeHTML(item.displayId) || 'N/A'}] | ${item.title === 'Waifu' ? 'Untitled' : escapeHTML(item.title)}
                            </div>
                            <div class="card-stats">
                                <div class="stat-group" style="pointer-events: auto;">
                                    <div class="stat-item" onclick="likeImage('${item.id}'); event.stopPropagation();" style="text-shadow: 0 0 5px #000;">
                                        <i class="${item.likes > 0 ? 'fas' : 'far'} fa-heart" style="${item.likes > 0 ? 'color:#ff007f;' : ''}"></i> 
                                        <span>${item.likes || 0}</span>
                                    </div>
                                </div>
                                <div class="stat-item" style="text-shadow: 0 0 5px #000;"><i class="far fa-eye"></i> <span>${item.views || 0}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            galleryBox.innerHTML = galleryHtml;
        }

        // Hàm tự động gom ảnh vào Album và hiển thị
        function renderAlbums(dataArray) {
            if (dataArray.length === 0) {
                galleryBox.innerHTML = '<p style="color: #666; text-align: center; width:100%; padding: 40px;">Không có album nào...</p>';
                return;
            }

            // Gom nhóm theo Title
            const groups = {};
            dataArray.forEach(img => {
                const title = img.title || "Waifu";
                if (!groups[title]) groups[title] = [];
                groups[title].push(img);
            });

            // Sắp xếp các Album: Tên A-Z, riêng Album "Chưa đặt tên" (Waifu) luôn ở cuối
            const sortedAlbumTitles = Object.keys(groups).sort((a, b) => {
                if (a === "Waifu") return 1;
                if (b === "Waifu") return -1;
                return a.localeCompare(b);
            });

            const albumsHtml = sortedAlbumTitles.map(title => {
                const imgs = groups[title];
                
                // Lấy ảnh bìa đã đặt cho album này từ bộ nhớ máy
                const savedCover = localStorage.getItem(`album_cover_${title}`);
                const isCustom = !!savedCover;
                const displayImg = savedCover || imgs[0].url;

                return `
                    <div class="gallery-card ${isCustom ? 'album-cover-special' : ''}" style="opacity:1" onclick="openAlbum('${title}')">
                        <img src="${displayImg}" alt="${title}" onerror="this.closest('.gallery-card').remove();">
                        <div class="album-badge"><i class="fas fa-layer-group"></i> ${imgs.length}</div>
                        <div class="card-info-overlay" style="align-items: center; padding-top: 30px;">
                            <div style="color: #00ffff; font-size: 12px; font-weight: bold; text-shadow: 0 0 10px #000; text-align: center; width: 100%;">
                                <i class="fas fa-folder-open" style="font-size: 10px; margin-right: 5px;"></i>
                                ${title === 'Waifu' ? 'Bộ sưu tập chưa đặt tên' : escapeHTML(title)}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            galleryBox.innerHTML = albumsHtml;
        }

        // Chuyển đổi chế độ xem
        function switchView(mode) {
            currentViewMode = mode;
            const searchInput = document.getElementById('searchInput');
            const selectionControls = document.getElementById('selectionControls');
            const galleryBox = document.getElementById('galleryBox');

            if (mode === 'images') {
                galleryBox.classList.remove('view-albums-mode');
            } else {
                galleryBox.classList.add('view-albums-mode');
                selectedIds.clear(); // Xóa lựa chọn khi đổi sang Album
                updateSelectionUI();
            }

            // Nếu nhấn vào nút Album, tự động xóa ô tìm kiếm để hiển thị lại toàn bộ các album khác
            if (mode === 'albums') {
                searchInput.value = '';
                document.getElementById('clearSearchBtn').style.display = 'none';
            }

            document.getElementById('viewImages').classList.toggle('active', mode === 'images');
            document.getElementById('viewAlbums').classList.toggle('active', mode === 'albums');
            
            const query = searchInput.value;
            refreshView();
        }

        // Hàm làm mới giao diện dựa trên chế độ xem và tìm kiếm hiện tại
        function refreshView() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                filterImages();
            } else {
                currentViewMode === 'images' ? renderGallery(currentImagesArray) : renderAlbums(currentImagesArray);
            }
        }

        // Khi nhấn vào Album, tự động lọc ảnh theo tên đó
        function openAlbum(title) {
            document.getElementById('searchInput').value = (title === 'Waifu') ? 'untitled' : title;
            switchView('images');
            history.pushState({view: 'album_detail'}, ''); // Đẩy trạng thái vào lịch sử
        }

        // Hàm lọc ảnh khi gõ vào thanh tìm kiếm
        let filteredArray = [];
        function filterImages() {
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearchBtn');
            const query = searchInput.value.toLowerCase();

            // Hiện/Ẩn nút X dựa trên việc có text hay không
            clearBtn.style.display = query ? 'block' : 'none';

            filteredArray = currentImagesArray.filter(img => {
                const normalizedTitle = (img.title || '').toLowerCase();
                const isDefaultTitle = normalizedTitle === 'waifu' || normalizedTitle === '';
                const queryMatchesDefault = (query === 'untitled' || query === 'no title') && isDefaultTitle;
                const matchesId = img.displayId && img.displayId.toLowerCase().includes(query);
                return normalizedTitle.includes(query) || img.url.toLowerCase().includes(query) || matchesId || queryMatchesDefault;
            });
            
            if (currentViewMode === 'images') {
                // Cập nhật mượt mà: Chỉ ẩn/hiện các card hiện có thay vì vẽ lại toàn bộ
                let cardsInDom = galleryBox.querySelectorAll('.gallery-card');
                
                // Nếu số lượng card trong DOM không khớp với dữ liệu gốc, vẽ lại toàn bộ 1 lần để đồng bộ
                if (cardsInDom.length !== currentImagesArray.length) {
                    renderGallery(currentImagesArray);
                    cardsInDom = galleryBox.querySelectorAll('.gallery-card');
                }

                const filteredIds = new Set(filteredArray.map(i => i.id));
                const filteredIdToIndex = new Map(filteredArray.map((item, idx) => [item.id, idx]));

                cardsInDom.forEach(card => {
                    const id = card.getAttribute('data-id');
                    if (filteredIds.has(id)) {
                        card.style.display = 'block';
                        // Cập nhật lại chỉ số index để Lightbox mở đúng thứ tự trong danh sách đã lọc
                        const newIdx = filteredIdToIndex.get(id);
                        card.setAttribute('onclick', `openLightbox(${newIdx}, 'filtered');`);
                    } else {
                        card.style.display = 'none';
                    }
                });
            } else {
                // Đối với chế độ Album, số lượng ít nên có thể giữ nguyên render lại hoặc áp dụng logic tương tự
                renderAlbums(filteredArray);
            }

            // TỰ ĐỘNG CUỘN XUỐNG VÙNG 2 KHI TÌM KIẾM THÀNH CÔNG
            if (query.length > 0 && filteredArray.length > 0) {
                const contentZone = document.querySelector('.content-zone');
                const headerOffset = 70; // Bù trừ cho thanh Sticky Header
                const targetPosition = contentZone.offsetTop - headerOffset;

                // Chỉ thực hiện cuộn nếu người dùng đang ở khu vực Landing Zone
                if (window.scrollY < contentZone.offsetTop - 200) {
                    window.scrollTo({ top: targetPosition, behavior: 'smooth' });
                }
            }
        }

        // Hàm xóa nhanh nội dung tìm kiếm
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filterImages();
            // Cuộn ngược lên trên đầu trang (Landing Zone) mượt mà khi xóa tìm kiếm
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Thao tác chọn tất cả
        function toggleSelectAll() {
            const visibleImages = (document.getElementById('searchInput').value.trim() === "") ? currentImagesArray : filteredArray;
            
            // Nếu đã chọn tất cả rồi thì bỏ chọn, ngược lại thì chọn hết
            const allSelected = visibleImages.every(img => selectedIds.has(img.id));
            
            if (allSelected) {
                visibleImages.forEach(img => selectedIds.delete(img.id));
            } else {
                visibleImages.forEach(img => selectedIds.add(img.id));
            }
            updateSelectionUI();
        }

        function clearSelection() {
            selectedIds.clear();
            updateSelectionUI();
        }

        async function renameSelected() {
            const newTitle = document.getElementById('bulkRenameInput').value.trim();
            if (!newTitle) {
                showToast('Vui lòng nhập tên mới!', 'error');
                return;
            }

            const count = selectedIds.size;
            if (window.confirm(`Đổi tên ${count} ảnh thành "${newTitle}"?`)) {
                statusDiv.innerText = `✏️ Đang đổi tên ${count} ảnh...`;
                const ids = Array.from(selectedIds);
                const updates = {};
                ids.forEach(id => {
                    updates[`/cosplay_images/${id}/title`] = newTitle;
                });
                try {
                    await database.ref().update(updates);
                    showToast(`Đã đổi tên thành công ${count} ảnh!`);
                    document.getElementById('bulkRenameInput').value = '';
                    selectedIds.clear();
                    updateSelectionUI();
                } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
                finally { statusDiv.innerText = ''; }
            }
        }

        // Hàm xóa ảnh trực tiếp từ giao diện web
        async function deleteImage(key) {
            if (window.confirm('Bạn có muốn chuyển ảnh này vào Thùng rác không?')) {
                try {
                    const snapshot = await database.ref(`cosplay_images/${key}`).once('value');
                    const data = snapshot.val();
                    if (data) {
                        // Lưu vào thùng rác kèm timestamp xóa
                        await database.ref(`deleted_images/${key}`).set({
                            ...data,
                            deletedAt: Date.now()
                        });
                        // Xóa khỏi danh sách chính
                        await database.ref(`cosplay_images/${key}`).remove();
                        showToast('Đã chuyển ảnh vào thùng rác!');
                        if (document.getElementById('lightboxOverlay').style.display === 'flex') closeLightbox();
                    }
                } catch (e) {
                    showToast('Lỗi: ' + e.message, 'error');
                }
            }
        }

        // Hàm tạo hiệu ứng trái tim bay
        function createFloatingHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '❤️';
            
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            
            // Tạo các hướng bay ngẫu nhiên
            const angle = Math.random() * Math.PI * 2;
            const distance = 80 + Math.random() * 120;
            const tx = Math.cos(angle) * distance;
            const ty = -Math.sin(angle) * distance - 100;
            
            heart.style.setProperty('--tx', tx + 'px');
            heart.style.setProperty('--ty', ty + 'px');
            
            document.body.appendChild(heart);
            console.log('❤️ Trái tim bay tạo tại:', x, y); // Debug
            
            // Xóa element sau khi animation kết thúc
            setTimeout(() => heart.remove(), 2000);
        }

        // Hàm thả tim ảnh trực tiếp
        function likeImage(key, event) {
            const itemRef = database.ref(`cosplay_images/${key}/likes`);
            itemRef.transaction(currentLikes => (currentLikes || 0) + 1);
            
            // Tạo hiệu ứng trái tim bay từ nút like
            const likeBtn = document.getElementById('lightboxLikeBtn');
            if (likeBtn) {
                const rect = likeBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // Tạo nhiều trái tim bay cùng một lúc
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createFloatingHeart(centerX, centerY);
                    }, i * 100);
                }
            }
        }

        // --- CÁC HÀM XỬ LÝ TRÌNH PHÓNG TO ẢNH (LIGHTBOX) ---
        let activeArray = [];
        function openLightbox(index, type = 'all') {
            activeArray = (document.getElementById('searchInput').value.trim() === "" && currentViewMode === 'images') ? currentImagesArray : (filteredArray.length > 0 ? filteredArray : currentImagesArray);
            
            currentLightboxIndex = index;
            const item = activeArray[index];
            
            if (document.getElementById('lightboxOverlay').style.display !== 'flex') {
                history.pushState({view: 'lightbox'}, '');
            }

            // [TỐI ƯU 1] Tải trước (Preload) ảnh tiếp theo và ảnh trước đó vào bộ nhớ đệm
            const nextIdx = (index + 1) % activeArray.length;
            const prevIdx = (index - 1 + activeArray.length) % activeArray.length;
            [activeArray[nextIdx], activeArray[prevIdx]].forEach(neighbor => {
                const p = new Image();
                p.src = neighbor.url.includes('cloudinary.com') ? neighbor.url.replace('/upload/', '/upload/f_auto,q_auto,w_1200/') : neighbor.url;
            });

            const img = document.getElementById('lightboxImg');
            const sizeSpan = document.getElementById('lightboxFileSize');

            // Kích hoạt hiệu ứng mờ dần khi bắt đầu chuyển
            img.classList.add('loading');
            sizeSpan.innerText = "..."; 

            // Đóng menu tính năng nếu đang mở
            const floatingActions = document.getElementById('floatingActions');
            if(floatingActions) floatingActions.classList.remove('show');

            database.ref(`cosplay_images/${item.id}/views`).transaction(currentViews => (currentViews || 0) + 1);

            img.onload = () => {
                img.classList.remove('loading');
                // Cập nhật kích thước thực tế của ảnh
                document.getElementById('lightboxResolution').innerText = `${img.naturalWidth} x ${img.naturalHeight}`;
            };
            img.onerror = () => {
                img.classList.remove('loading');
                document.getElementById('lightboxResolution').innerText = "N/A";
            };

            // [TỐI ƯU 2] Lấy dung lượng file chỉ bằng HEAD request (Không tải lại cả file)
            fetch(item.url, { method: 'HEAD' }).then(response => {
                const size = response.headers.get('content-length');
                if (size) {
                    const kb = size / 1024;
                    sizeSpan.innerText = kb > 1024 ? (kb / 1024).toFixed(2) + ' MB' : kb.toFixed(2) + ' KB';
                } else { sizeSpan.innerText = "N/A"; }
            }).catch(() => { sizeSpan.innerText = "N/A"; });

            // [TỐI ƯU 3] Sử dụng tính năng nén tự động (f_auto, q_auto) của Cloudinary để hiện ảnh cực nhanh
            img.src = item.url.includes('cloudinary.com') ? item.url.replace('/upload/', '/upload/f_auto,q_auto,w_1600/') : item.url;
            img.alt = item.title || 'Cosplay'; 

            document.getElementById('lightboxOverlay').style.display = 'flex'; // Hiển thị lightbox

            // Xử lý mục nhập tên ảnh
            const titleInput = document.getElementById('lightboxTitleInput');
            titleInput.value = (item.title === 'Waifu') ? '' : (item.title || '');
            document.getElementById('lightboxIdDisplay').innerText = `ID: ${item.displayId || 'N/A'}`;

            const saveAction = function() {
                const newTitle = titleInput.value.trim();
                if (newTitle) {
                    database.ref(`cosplay_images/${item.id}`).update({ title: newTitle })
                        .then(() => {
                            showToast('Đã cập nhật tên ảnh!');
                            // Tự động chuyển sang ảnh tiếp theo để tiếp tục đặt tên
                            nextImage();
                        })
                        .catch(err => showToast('Lỗi: ' + err, 'error'));
                } else {
                    showToast('Vui lòng nhập tên ảnh!', 'error');
                }
            };

            document.getElementById('lightboxSaveTitleBtn').onclick = saveAction;
            titleInput.onkeydown = (e) => { if (e.key === 'Enter') saveAction(); };

            document.getElementById('lightboxLikeBtn').onclick = function(e) { 
                likeImage(item.id, e);
                e.preventDefault();
            };
            document.getElementById('lightboxDeleteBtn').onclick = function() { deleteImage(item.id); };
            
            document.getElementById('lightboxDownloadBtn').onclick = async function() {
                try {
                    const response = await fetch(item.url);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    // Đặt tên file khi tải về bao gồm Tên ảnh và ID để dễ quản lý
                    link.download = `${item.title || 'Waifu'}_${item.displayId || 'photo'}.jpg`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    showToast('Đang bắt đầu tải xuống...');
                } catch (err) {
                    window.open(item.url, '_blank');
                }
            };
        }

        function closeLightbox() {
            // Thay vì đóng trực tiếp, ta gọi history.back() 
            // Sự kiện popstate bên dưới sẽ tự động xử lý việc đóng UI
            if (document.getElementById('lightboxOverlay').style.display === 'flex') {
                history.back();
            }
        }

                function nextImage() {
            if (currentLightboxIndex < activeArray.length - 1) {
                openLightbox(currentLightboxIndex + 1);
            } else { openLightbox(0); }
        }

        function prevImage() {
            if (currentLightboxIndex > 0) {
                openLightbox(currentLightboxIndex - 1);
            } else {
                openLightbox(activeArray.length - 1);
            }
        }

        // Hỗ trợ phím tắt điều hướng
        document.addEventListener('keydown', (e) => {
            const isLightboxOpen = document.getElementById('lightboxOverlay').style.display === 'flex';
            if (!isLightboxOpen) return;
            
            // Ngăn chặn chuyển ảnh bằng phím mũi tên khi đang tập trung gõ vào ô nhập liệu
            if (e.target.id === "lightboxTitleInput") return;

            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowRight") nextImage();
            if (e.key === "ArrowLeft") prevImage();
        });

        // --- HỖ TRỢ VUỐT (SWIPE) TRÊN ĐIỆN THOẠI ---
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('lightboxOverlay').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.getElementById('lightboxOverlay').addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeThreshold = 50; // Khoảng cách tối thiểu (pixel) để tính là một cú vuốt
            
            // Không chuyển ảnh nếu người dùng đang gõ trong ô nhập liệu
            if (document.activeElement.id === "lightboxTitleInput") return;

            if (touchEndX < touchStartX - swipeThreshold) nextImage(); // Vuốt sang trái -> Ảnh tiếp theo
            if (touchEndX > touchStartX + swipeThreshold) prevImage(); // Vuốt sang phải -> Ảnh trước đó
        }, { passive: true });

        // Copy link ảnh
        function copyCurrentLink() {
            const url = activeArray[currentLightboxIndex].url;
            navigator.clipboard.writeText(url).then(() => showToast('Đã sao chép link ảnh!'));
        }

        // Hiện/Ẩn menu chọn loại hình nền
        function toggleBgMenu() {
            document.getElementById('bgSubmenu').classList.toggle('active');
        }

        // --- HÀM XỬ LÝ QR CODE ---
        function showQRCode() {

                showToast("Ảnh này chưa có ID để tạo QR!", "error");

        function closeQRModal() {

        }

        // Hàm đặt ảnh làm hình nền trang web
        function setAsAppBackground() {
            const url = activeArray[currentLightboxIndex].url;
            localStorage.setItem('cyberpunk_bg', url);
            applyBackground(url);
            showToast('Đã đổi hình nền trang web!');

        // Hàm đặt ảnh làm ảnh đại diện cho Album
        function setAsAlbumCover() {
            const item = activeArray[currentLightboxIndex];
            // Nếu ảnh không tên thì album là "Waifu"
            const title = item.title || "Waifu";
            
            localStorage.setItem(`album_cover_${title}`, item.url);
            showToast(`Đã đặt ảnh bìa cho album: ${title === 'Waifu' ? 'Untitled' : title}`);
            
            // Đóng menu
            document.getElementById('bgSubmenu').classList.remove('active');
            
            // Nếu đang ở chế độ xem Album thì cập nhật lại giao diện ngay

        function applyBackground(url) {
            const bgDiv = document.getElementById('customBackground');

                bgDiv.style.backgroundImage = `url('${url}')`;
                bgDiv.style.display = 'block';
            } else {

            }
